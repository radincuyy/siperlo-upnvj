<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="POB SIPERLO format swimlane">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000"/>
    </marker>
    <style>
      .bg { fill:#83d5e9; }
      .line { stroke:#000; stroke-width:1.3; fill:none; }
      .arrow { stroke:#000; stroke-width:1.7; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#000; stroke-width:1.3; fill:none; stroke-dasharray:3 6; }
      .task { fill:#f3f66b; stroke:#000; stroke-width:1.2; }
      .decision { fill:#ff9e37; stroke:#000; stroke-width:1.4; }
      .start { fill:#b9ff6b; stroke:#000; stroke-width:1.3; }
      .end { fill:#ee7777; stroke:#000; stroke-width:4; }
      .timer { fill:#b9ff6b; stroke:#000; stroke-width:1.2; }
      .smallbox { fill:#7edcff; stroke:#000; stroke-width:1.1; }
      .doc { fill:#fff2a8; stroke:#000; stroke-width:1.2; }
      .fold { fill:#83d5e9; stroke:#000; stroke-width:1.1; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#000; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size:12px; fill:#000; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size:11px; fill:#000; }
      .laneText { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#000; writing-mode:tb; glyph-orientation-vertical:0; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size:16px; fill:#000; }
    </style>
  </defs>

  <!-- overall frame and swimlanes -->
  <rect x="10" y="10" width="1580" height="875" class="bg line"/>
  <rect x="10" y="10" width="20" height="875" fill="#83d5e9" stroke="#000" stroke-width="1.3"/>
  <text x="22" y="468" transform="rotate(-90 22 468)" class="label" text-anchor="middle">POB-SIPERLO-01</text>

  <line x1="30" y1="125" x2="1590" y2="125" class="line"/>
  <line x1="30" y1="295" x2="1590" y2="295" class="line"/>
  <line x1="30" y1="455" x2="1590" y2="455" class="line"/>
  <line x1="30" y1="620" x2="1590" y2="620" class="line"/>
  <line x1="95" y1="10" x2="95" y2="885" class="line"/>

  <text x="48" y="70" transform="rotate(-90 48 70)" class="small">Pimpinan</text>
  <text x="48" y="210" transform="rotate(-90 48 210)" class="small">Admin Kemahasiswaan</text>
  <text x="48" y="375" transform="rotate(-90 48 375)" class="small">Mentor / Dana</text>
  <text x="48" y="540" transform="rotate(-90 48 540)" class="small">Sistem SIPERLO</text>
  <text x="48" y="755" transform="rotate(-90 48 755)" class="small">Mahasiswa</text>

  <!-- lane title -->
  <text x="760" y="35" class="title" text-anchor="middle">Prosedur Operasional Baku Pendaftaran, Verifikasi, Dukungan, dan Pelaporan Lomba</text>

  <!-- connector arrows behind nodes -->
  <path d="M140 775 H235" class="arrow"/>
  <path d="M395 775 H455" class="arrow"/>
  <path d="M650 775 V555 H705" class="arrow"/>
  <path d="M905 555 V215 H950" class="arrow"/>
  <path d="M1115 215 H1175" class="arrow"/>
  <path d="M1210 240 V555 H1245" class="arrow"/>
  <path d="M1210 240 V190 H810 V735 H850" class="arrow"/>
  <path d="M1045 735 V655 H710 V555" class="arrow"/>
  <path d="M1375 555 V735 H1405" class="arrow"/>
  <path d="M1490 735 V245 H1450" class="arrow"/>
  <path d="M1370 215 C1370 120 1280 88 1170 88" class="arrow"/>
  <path d="M1170 88 C1050 88 1000 120 1000 175" class="arrow"/>
  <path d="M1490 245 V777" class="arrow"/>
  <path d="M1490 245 V78 H1380" class="arrow"/>

  <!-- optional support connectors -->
  <path d="M1115 555 V382 H970" class="arrow"/>
  <path d="M810 382 H705 V555" class="arrow"/>
  <path d="M970 382 H1110 V245 H1165" class="arrow"/>

  <!-- start -->
  <circle cx="125" cy="775" r="16" class="start"/>
  <text x="105" y="817" class="small">Mulai</text>

  <!-- student tasks -->
  <rect x="235" y="730" width="160" height="90" rx="12" class="task"/>
  <text x="315" y="760" class="small" text-anchor="middle">Mencari dan</text>
  <text x="315" y="778" class="small" text-anchor="middle">Memilih Lomba</text>
  <text x="315" y="796" class="tiny" text-anchor="middle">/lomba</text>

  <rect x="455" y="720" width="195" height="110" rx="12" class="task"/>
  <text x="552" y="753" class="small" text-anchor="middle">Mengajukan</text>
  <text x="552" y="771" class="small" text-anchor="middle">Pendaftaran Lomba</text>
  <text x="552" y="789" class="small" text-anchor="middle">+ Upload Bukti</text>
  <text x="552" y="807" class="tiny" text-anchor="middle">JPG/PNG/PDF maks. 2MB</text>

  <rect x="850" y="707" width="195" height="78" rx="12" class="task"/>
  <text x="948" y="737" class="small" text-anchor="middle">Upload Ulang Bukti</text>
  <text x="948" y="755" class="small" text-anchor="middle">Sesuai Catatan Admin</text>
  <text x="948" y="773" class="tiny" text-anchor="middle">jika proof ditolak</text>

  <rect x="1405" y="700" width="150" height="70" rx="12" class="task"/>
  <text x="1480" y="728" class="small" text-anchor="middle">Mengikuti Lomba</text>
  <text x="1480" y="746" class="small" text-anchor="middle">dan Lapor Hasil</text>

  <!-- documents student -->
  <path d="M676 740 H710 L728 758 V815 H676 Z" class="doc"/>
  <path d="M710 740 V758 H728" class="fold"/>
  <line x1="650" y1="775" x2="676" y2="775" class="dash"/>
  <text x="702" y="840" class="tiny" text-anchor="middle">Bukti Pendaftaran</text>

  <path d="M1328 705 H1360 L1378 723 V780 H1328 Z" class="doc"/>
  <path d="M1360 705 V723 H1378" class="fold"/>
  <line x1="1405" y1="735" x2="1378" y2="735" class="dash"/>
  <text x="1353" y="805" class="tiny" text-anchor="middle">Sertifikat / Laporan</text>

  <!-- system tasks -->
  <rect x="705" y="515" width="200" height="80" rx="12" class="task"/>
  <text x="805" y="545" class="small" text-anchor="middle">Membuat Data</text>
  <text x="805" y="563" class="small" text-anchor="middle">Registration</text>
  <text x="805" y="581" class="tiny" text-anchor="middle">registered + proof pending</text>

  <rect x="1245" y="515" width="190" height="80" rx="12" class="task"/>
  <text x="1340" y="545" class="small" text-anchor="middle">Status Pendaftaran</text>
  <text x="1340" y="563" class="small" text-anchor="middle">Menjadi Berlangsung</text>
  <text x="1340" y="581" class="tiny" text-anchor="middle">proof_status = verified</text>

  <!-- optional support lane -->
  <rect x="810" y="345" width="160" height="75" rx="12" class="task"/>
  <text x="890" y="374" class="small" text-anchor="middle">Ajukan Mentor</text>
  <text x="890" y="392" class="small" text-anchor="middle">/ Dana</text>
  <text x="890" y="410" class="tiny" text-anchor="middle">Opsional</text>

  <rect x="1110" y="345" width="185" height="75" rx="12" class="task"/>
  <text x="1202" y="374" class="small" text-anchor="middle">Review Mentor</text>
  <text x="1202" y="392" class="small" text-anchor="middle">atau Dana</text>
  <text x="1202" y="410" class="tiny" text-anchor="middle">approved / rejected</text>

  <!-- admin tasks and decisions -->
  <rect x="950" y="175" width="165" height="80" rx="12" class="task"/>
  <text x="1032" y="204" class="small" text-anchor="middle">Memeriksa Bukti</text>
  <text x="1032" y="222" class="small" text-anchor="middle">Pendaftaran</text>
  <text x="1032" y="240" class="tiny" text-anchor="middle">/admin/registrations</text>

  <path d="M1210 177 L1248 215 L1210 253 L1172 215 Z" class="decision"/>
  <text x="1210" y="211" class="tiny" text-anchor="middle">Bukti</text>
  <text x="1210" y="225" class="tiny" text-anchor="middle">Valid?</text>
  <text x="1126" y="190" class="tiny">Tidak</text>
  <text x="1252" y="245" class="tiny">Ya</text>

  <rect x="1288" y="175" width="160" height="80" rx="12" class="task"/>
  <text x="1368" y="204" class="small" text-anchor="middle">Validasi Laporan</text>
  <text x="1368" y="222" class="small" text-anchor="middle">Hasil Lomba</text>
  <text x="1368" y="240" class="tiny" text-anchor="middle">approved/revision/rejected</text>

  <!-- pimpinan / monitoring -->
  <rect x="1210" y="50" width="170" height="75" rx="12" class="task"/>
  <text x="1295" y="79" class="small" text-anchor="middle">Monitoring</text>
  <text x="1295" y="97" class="small" text-anchor="middle">Read-Only</text>
  <text x="1295" y="115" class="tiny" text-anchor="middle">/pimpinan/dashboard</text>

  <!-- IT mini note in top lane -->
  <path d="M1090 52 H1120 L1138 70 V112 H1090 Z" class="doc"/>
  <path d="M1120 52 V70 H1138" class="fold"/>
  <text x="1114" y="137" class="tiny" text-anchor="middle">Data katalog dari</text>
  <text x="1114" y="151" class="tiny" text-anchor="middle">scraper infolomba.id</text>

  <!-- end -->
  <circle cx="1490" cy="795" r="14" class="end"/>
  <text x="1466" y="833" class="small">Selesai</text>

  <!-- timers / SLA icons -->
  <circle cx="455" cy="720" r="12" class="timer"/>
  <text x="455" y="725" class="tiny" text-anchor="middle">⏱</text>
  <rect x="415" y="695" width="62" height="23" class="smallbox"/>
  <text x="446" y="711" class="tiny" text-anchor="middle">24 Jam</text>

  <circle cx="905" cy="555" r="12" class="timer"/>
  <text x="905" y="560" class="tiny" text-anchor="middle">⏱</text>
  <rect x="914" y="568" width="64" height="23" class="smallbox"/>
  <text x="946" y="584" class="tiny" text-anchor="middle">2 Hari</text>

  <circle cx="1115" cy="382" r="12" class="timer"/>
  <text x="1115" y="387" class="tiny" text-anchor="middle">⏱</text>
  <rect x="1130" y="395" width="64" height="23" class="smallbox"/>
  <text x="1162" y="411" class="tiny" text-anchor="middle">3 Hari</text>

  <circle cx="1448" cy="175" r="12" class="timer"/>
  <text x="1448" y="180" class="tiny" text-anchor="middle">⏱</text>
  <rect x="1463" y="188" width="64" height="23" class="smallbox"/>
  <text x="1495" y="204" class="tiny" text-anchor="middle">3 Hari</text>

  <!-- status notes -->
  <text x="710" y="500" class="tiny">Status: Terdaftar</text>
  <text x="1245" y="500" class="tiny">Gate: bukti harus verified</text>
  <text x="1295" y="145" class="tiny" text-anchor="middle">Data prestasi &amp; partisipasi otomatis masuk monitoring</text>
</svg>